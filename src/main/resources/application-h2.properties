# Optional H2 profile
# Use this only when you want to run the project without MySQL for quick local
# experiments. MySQL standalone remains the recommended default setup.
spring.datasource.url=jdbc:h2:file:./data/smart_campus_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
