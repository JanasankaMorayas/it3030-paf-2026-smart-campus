spring.application.name=smart-campus

# Server Port
server.port=8080

# Multipart File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# Default local development database (MySQL standalone)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db_v2?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.h2.console.enabled=false

# Local development auth users
app.security.dev-users.enabled=true
app.security.dev-users.admin.email=dev-admin@smartcampus.local
app.security.dev-users.admin.display-name=Development Admin
app.security.dev-users.admin.password=dev-admin-pass
app.security.dev-users.user.email=dev-user@smartcampus.local
app.security.dev-users.user.display-name=Development User
app.security.dev-users.user.password=dev-user-pass
app.security.dev-users.technician.email=dev-tech@smartcampus.local
app.security.dev-users.technician.display-name=Development Technician
app.security.dev-users.technician.password=dev-tech-pass

# OAuth2 login settings
# Fallback frontend redirect after Google OAuth login.
# You can override this with FRONTEND_BASE_URL, for example http://127.0.0.1:5174/
app.security.oauth2.success-redirect-uri=${FRONTEND_BASE_URL:http://127.0.0.1:5173/}

# Local frontend dev origins for Vite
app.security.dev-frontend-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176,http://localhost:5177,http://127.0.0.1:5177,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4174,http://127.0.0.1:4174}

# Google OAuth2 configuration
# Keep secrets outside the repo. These values are designed for environment variables or external config.
app.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
app.security.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
app.security.oauth2.google.scope=openid,profile,email
app.security.oauth2.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
app.security.oauth2.google.client-name=Google

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.data.web.pageable.max-page-size=100

