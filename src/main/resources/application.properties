spring.application.name=smart-campus
# Server Port
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db_v2?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Local development auth users
app.security.dev-users.enabled=true
app.security.dev-users.admin.email=dev-admin@smartcampus.local
app.security.dev-users.admin.display-name=Development Admin
app.security.dev-users.admin.password=dev-admin-pass
app.security.dev-users.user.email=dev-user@smartcampus.local
app.security.dev-users.user.display-name=Development User
app.security.dev-users.user.password=dev-user-pass
app.security.dev-users.technician.email=dev-tech@smartcampus.local
app.security.dev-users.technician.display-name=Development Technician
app.security.dev-users.technician.password=dev-tech-pass

# OAuth2 login settings
app.security.oauth2.success-redirect-uri=/api/users/me

# Local frontend dev origins for Vite
app.security.dev-frontend-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4174,http://127.0.0.1:4174

# Google OAuth2 configuration
# Keep secrets outside the repo. These values are designed for environment variables or external config.
app.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.security.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.security.oauth2.google.scope=openid,profile,email
app.security.oauth2.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
app.security.oauth2.google.client-name=Google

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.data.web.pageable.max-page-size=100
